<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomePage</title>
    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font- awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body class="bg-[#F4F5F7] ">
    <div class="bg-white max-w-lg mx-auto rounded-b-xl">
        <!-- navbar -->
        <div class=" flex justify-between items-center min-h-[50px] p-4 bg-white border-b-1 border-gray-400">
            <div class="flex gap-3 ">
                <img src="./assets/Group.png" class="w-[50px]" alt="">

                <div>
                    <h2 class="font-bold text-xl">$<span id="existing-amount">45000</span></h2>
                    <p class="text-[#08080880]">Available balance</p>
                </div>
            </div>
            <div>
                <button class="btn btn-soft text-[#08080880] bg-white rounded-lg"><i
                        class="fa-solid fa-arrow-right-from-bracket rotate-180"></i>Log Out</button>
            </div>
        </div>
        <!-- banner heading -->
        <div class="mt-5 p-5">
            <h1 class="font-bold text-2xl">🔥 Welcome to Payooo!</h1>
            <p class="text-[#08080880] mt-2">Enjoy easy and convenient financial services with us. Cashout charge is low
                and
                transactions are fast and secure.
            </p>
        </div>
        <!-- cart section -->
        <div class="max-w-lg mx-auto grid grid-cols-3 grid-rows-2 gap-5 p-5">
            <div class="border-1 border-gray-300 rounded-xl px-3 py-6">
                <img src="./assets/wallet1.png" class="mx-auto" alt="">
                <p class="text-center text-gray-500 font-medium ">Add Money</p>
            </div>
            <div class="border-1 border-gray-300 rounded-xl px-3 py-6">
                <img src="./assets/send1.png" class="mx-auto" alt="">
                <p class="text-center text-gray-500 font-medium">Cash Out</p>
            </div>
            <div class="border-1 border-gray-300 rounded-xl px-3 py-6">
                <img src="./assets/money1.png" class="mx-auto" alt="">
                <p class="text-center text-gray-500 font-medium">Transfer Money</p>
            </div>
            <div class="border-1 border-gray-300 rounded-xl px-3 py-6">
                <img src="./assets/bonus1.png" class="mx-auto" alt="">
                <p class="text-center text-gray-500 font-medium">Get Bonus</p>
            </div>
            <div class="border-1 border-gray-300 rounded-xl px-3 py-6">
                <img src="./assets/purse1.png" class="mx-auto" alt="">
                <p class="text-center text-gray-500 font-medium">Pay Bill</p>
            </div>
            <div class="border-1 border-gray-300 rounded-xl px-3 py-6">
                <img src="./assets/transaction1.png" class="mx-auto" alt="">
                <p class="text-center text-gray-500 font-medium">Transactions</p>
            </div>
        </div>
    </div>

    <!-- add money form -->
    <div class="allMoneySection max-w-lg mx-auto p-5">
        <h2 class="font-bold text-xl mt-5">Add Money</h2>
        <form class="bg-white my-5 p-7 rounded-2xl">
            <div>
                <label for="" class="font-medium text-gray-600">Select a Bank</label>
                <br>
                <select id="bank-name" class="select w-full bg-[#F4F5F7] mt-2 rounded-full border-none">
                    <option disabled selected>Select Bank</option>
                    <option>Brac Bank</option>
                    <option>Standard Chartered Bank</option>
                    <option>City Bank</option>
                    <option>HSBC</option>
                </select>
            </div>
            <div class="mt-3">
                <label for="" class="font-medium text-gray-600">Bank Account Number</label>
                <br>
                <input id="bank-account-number" type="text" placeholder="Enter 11 digit account number"
                    class="input w-full bg-[#F4F5F7] mt-2 rounded-full border-none" />
            </div>
            <div class="mt-3">
                <label for="" class="font-medium text-gray-600">Amount to Add</label>
                <br>
                <input id="amount" type="text" placeholder="Add amount to withdraw"
                    class="input w-full bg-[#F4F5F7] mt-2 rounded-full border-none" />
            </div>
            <div class="mt-3">
                <label for="" class="font-medium text-gray-600">Pin Number</label>
                <br>
                <input id="pin-number" type="text" placeholder="Enter 4 digit pin number"
                    class="input w-full bg-[#F4F5F7] mt-2 rounded-full border-none" />
            </div>
            <button id="add-money-btn" class="btn bg-[#0874F2] text-white w-full mt-5 rounded-full">Add Money</button>

        </form>
    </div>
    <!-- script -->
    <script src="./home.js"></script>
</body>

</html>
