<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo</title>
    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-[#F4F5F7] h-[100vh] flex justify-center items-center">
    <form class="bg-white p-7 rounded-2xl w-[350px]">
        <div>
            <label for="" class="font-medium">Mobile Number</label>
            <br>
            <input type="text " placeholder="Enter your number"
                class="input bg-[#F4F5F7] mt-2 rounded-full border-none" />
        </div>
        <div class="mt-5">
            <label for="" class="font-medium">4 Digit Pin</label>
            <br>
            <input type="text" placeholder="Enter 4 digit Pin"
                class="input bg-[#F4F5F7] mt-2 rounded-full border-none" />
        </div>
        <button class="btn bg-[#0874F2] text-white w-full mt-5 rounded-full">Login</button>

    </form>

</body>

</html>
